#cloud-config
package_update: true
packages:
  - apache2
  - curl
write_files:
  - path: /var/www/html/index.html
    permissions: "644"
    content: |
      <!DOCTYPE html>
      <html lang="en">
        <body>
            <h1>Funciona Por favor</h1>
        </body>
      </html>
runcmd:
  - systemctl enable apache2
  - systemctl start apache2
